<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 MovieQuiz — Дмитрий Сейцман</title>
  <meta name="description" content="MovieQuiz — iOS-проект на UIKit/MVC: викторина по фильмам с результатами и сетевыми данными. Кейс из портфолио Dmitrii Seitsman." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#060914" />
  <link rel="canonical" href="https://seitsman.com/MovieQuiz.html" />
  <meta property="og:title" content="MovieQuiz — iOS Project | Dmitrii Seitsman" />
  <meta property="og:description" content="UIKit/MVC movie quiz app case from iOS developer portfolio." />
  <meta property="og:image" content="https://seitsman.com/images/preview.png" />
  <meta property="og:url" content="https://seitsman.com/MovieQuiz.html" />
  <meta property="og:type" content="article" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MovieQuiz — iOS Project" />
  <meta name="twitter:description" content="UIKit/MVC iOS movie quiz case study." />
  <meta name="twitter:image" content="https://seitsman.com/images/preview.png" />

  <link rel="stylesheet" href="/style.css" />

  <style>
    body {
      background: #0b1e33;
      color: #ccc;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
    }

    main.project-page {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: calc(100vh - 160px);
      padding-top: 120px;
      box-sizing: border-box;
    }

    .project-container {
      text-align: center;
      animation: fadeIn 0.8s ease forwards;
      opacity: 0;
      padding: 40px 20px 60px;
      max-width: 960px;
      width: 100%;
      background: rgba(19, 43, 74, 0.8);
      border-radius: 20px;
      box-shadow: 0 4px 28px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === Заголовок проекта === */
    .project-title {
      color: #fff;
      font-size: 2rem;
      margin-bottom: 16px;
      text-shadow:
        0 0 8px rgba(111,168,255,0.6),
        0 0 16px rgba(111,168,255,0.4);
      animation: h2Pulse 3s ease-in-out infinite;
    }

    @keyframes h2Pulse {
      0%, 100% { text-shadow: 0 0 8px rgba(111,168,255,0.6), 0 0 16px rgba(111,168,255,0.4); }
      50% { text-shadow: 0 0 12px rgba(111,168,255,0.9), 0 0 24px rgba(111,168,255,0.6); }
    }

    .tech-stack {
      color: #ccc;
      font-size: 1.1rem;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    /* === Сетка скринов === */
    .screenshot-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin: 0 auto 40px;
      max-width: 880px;
    }

    .screenshot-grid img {
      width: 225px;
      border-radius: 14px;
      background: rgba(11, 30, 51, 0.8);
      padding: 8px;
      box-shadow:
        0 0 12px rgba(111,168,255,0.25),
        0 0 18px rgba(111,168,255,0.15);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .screenshot-grid img:hover {
      transform: scale(1.05);
      box-shadow:
        0 0 20px rgba(111,168,255,0.5),
        0 0 40px rgba(111,168,255,0.3);
    }

    /* === Лайтбокс === */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      animation: zoomIn 0.3s ease;
    }

    @keyframes zoomIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 2rem;
      color: #6FA8FF;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s ease;
    }

    .lightbox-close:hover {
      transform: scale(1.2);
    }

    /* === Кнопка GitHub === */
    .github-button {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 24px;
      border: 1px solid #6FA8FF;
      border-radius: 8px;
      color: #6FA8FF;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .github-button:hover {
      background: #6FA8FF;
      color: #0b1e33;
      transform: scale(1.05);
      box-shadow: 0 0 16px rgba(111,168,255,0.4);
    }

    @media (max-width: 768px) {
      main.project-page {
        padding-top: 100px;
      }

      .screenshot-grid img {
        width: 90%;
      }
    }
  </style>
</head>

<body>
  <main class="project-page">
    <section class="project-container">
      <h2 class="project-title" id="project-title">🎬 MovieQuiz</h2>
      <p class="tech-stack" id="tech-stack">
        MovieQuiz — интерактивная викторина по фильмам с оценкой и результатами.<br>
        <strong>Стек:</strong> UIKit, MVC, JSON, анимации, работа с сетевыми данными.
      </p>

      <div class="screenshot-grid">
        <img src="/images/moviequiz_1.png" alt="MovieQuiz iOS app screenshot 1" loading="lazy" />
        <img src="/images/moviequiz_2.png" alt="MovieQuiz iOS app screenshot 2" loading="lazy" />
        <img src="/images/moviequiz_3.png" alt="MovieQuiz iOS app screenshot 3" loading="lazy" />
      </div>

      <a href="https://github.com/DmitriiSeitsman/MovieQuiz"
         target="_blank"
         rel="noopener noreferrer"
         class="github-button"
         id="github-button">
        Посмотреть на GitHub
      </a>
    </section>
  </main>

  <footer id="footer">
    © 2025 Дмитрий Сейцман — сайт создан на чистом энтузиазме и кофе ☕
  </footer>

  <script src="/scripts.js"></script>
  <script>
    const pageLang = {
      ru: {
        title: "🎬 MovieQuiz — Дмитрий Сейцман",
        tech: "MovieQuiz — интерактивная викторина по фильмам с оценкой и результатами.<br><strong>Стек:</strong> UIKit, MVC, JSON, анимации, работа с сетевыми данными.",
        github: "Посмотреть на GitHub"
      },
      en: {
        title: "🎬 MovieQuiz — Dmitrii Seitsman",
        tech: "MovieQuiz — an interactive movie quiz app with scoring and results.<br><strong>Stack:</strong> UIKit, MVC, JSON, animations, networking.",
        github: "View on GitHub"
      }
    };

    function applyPageLang(lang) {
      document.title = pageLang[lang].title;
      document.getElementById("tech-stack").innerHTML = pageLang[lang].tech;
      document.getElementById("github-button").innerText = pageLang[lang].github;
    }

    const lang = localStorage.getItem("lang") || "ru";
    applyPageLang(lang);
    document.addEventListener("langchange", (e) => applyPageLang(e.detail.lang));

    /* === Лайтбокс === */
    const gridImages = document.querySelectorAll(".screenshot-grid img");
    if (gridImages.length > 0) {
      const lightbox = document.createElement("div");
      lightbox.className = "lightbox";
      const closeBtn = document.createElement("div");
      closeBtn.className = "lightbox-close";
      closeBtn.innerHTML = "&times;";
      const lightboxImg = document.createElement("img");
      lightbox.appendChild(lightboxImg);
      lightbox.appendChild(closeBtn);
      document.body.appendChild(lightbox);

      gridImages.forEach((img) => {
        img.addEventListener("click", () => {
          lightboxImg.src = img.src;
          lightbox.classList.add("active");
        });
      });

      closeBtn.addEventListener("click", () => lightbox.classList.remove("active"));
      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) lightbox.classList.remove("active");
      });
    }
  </script>
</body>
</html>
