  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/9/9e/Swift_logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* === Контейнер секции (в едином стиле со страницами) === */
    .contact-section {
      max-width: 900px;
      margin: 80px auto;
      padding: 40px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.3);
      text-align: center;
      transition: box-shadow 0.6s ease;
      backdrop-filter: blur(6px);
      animation: fadeSlideIn 1s ease-out forwards;
    }

    .contact-section:hover {
      box-shadow: 0 0 30px rgba(187, 134, 252, 0.25);
    }

    /* === Подзаголовок (пульсирующий белый, как h2 на других страницах) === */
    .contact-section h2 {
      color: #fff;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 30px;
      text-shadow:
        0 0 6px rgba(111,168,255,0.4),
        0 0 12px rgba(111,168,255,0.3);
      animation: h2Pulse 3s ease-in-out infinite;
    }

    /* === Контейнер с карточками === */
    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* === Каждая карточка === */
    .contact-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-primary);
      font-size: 1.1rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      transition: transform 0.2s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }

    /* === Светящийся эффект при наведении на карточку === */
    .contact-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.25);
    }

    /* === Содержимое карточки === */
    .contact-card span {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }

    .contact-card a {
      color: var(--type);
      text-decoration: none;
      font-weight: 500;
      transition: text-shadow 0.3s ease, opacity 0.3s ease;
    }

    .contact-card a:hover {
      opacity: 0.9;
      text-shadow: 0 0 8px rgba(187,134,252,0.6);
    }

    /* === Мобильная адаптация === */
    @media (max-width: 768px) {
      .contact-section {
        margin: 40px 16px;
        padding: 30px 20px;
      }

      .contact-list {
        gap: 16px;
      }

      .contact-card {
        flex-direction: column;
        align-items: flex-start;
        padding: 16px 18px;
        gap: 6px;
        font-size: 1rem;
      }

      .contact-card span {
        font-size: 1rem;
      }

      .contact-section h2 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>
  <!-- 💡 header.html подгружается через scripts.js -->

  <main>
    <section class="contact-section">
      <h2 id="contact-title">Связаться со мной</h2>

      <div class="contact-list">
        <div class="contact-card" id="email-card">
          <span id="email-label">📬 Почта:</span>
          <a href="#" id="email-link">Написать письмо</a>
        </div>

        <div class="contact-card" id="telegram-card">
          <span id="telegram-label">💬 Телеграм:</span>
          <a href="#" id="telegram-link">Открыть чат</a>
        </div>

        <div class="contact-card" id="github-card">
          <span id="github-label">💻 GitHub:</span>
          <a href="#" id="github-link">Посмотреть профиль</a>
        </div>
      </div>
    </section>
  </main>

  <footer id="footer">
    © 2025 Дмитрий Сейцман — создано на Swift и кофе ☕
  </footer>

  <script src="scripts.js"></script>
  <script>
    const pageLang = {
      ru: {
        title: "Контакты — Дмитрий Сейцман",
        contactTitle: "Связаться со мной",
        emailLabel: "📬 Почта:",
        telegramLabel: "💬 Телеграм:",
        githubLabel: "💻 GitHub:",
        emailText: "Написать письмо",
        telegramText: "Открыть чат",
        githubText: "Посмотреть профиль"
      },
      en: {
        title: "Contact — Dmitrii Seitsman",
        contactTitle: "Get in touch",
        emailLabel: "📬 Email:",
        telegramLabel: "💬 Telegram:",
        githubLabel: "💻 GitHub:",
        emailText: "Send an email",
        telegramText: "Message on Telegram",
        githubText: "View GitHub profile"
      }
    };

    const hidden = {
      email: ["s","e","y","t","s","m","a","n","@","g","m","a","i","l",".","c","o","m"].join(""),
      telegram: ["h","t","t","p","s",":","/","/","t",".","m","e","/","d","s","e","i","t","s","m","a","n"].join(""),
      github: ["h","t","t","p","s",":","/","/","g","i","t","h","u","b",".","c","o","m","/","D","m","i","t","r","i","i","S","e","i","t","s","m","a","n"].join("")
    };

    const emailLink = document.getElementById("email-link");
    const telegramLink = document.getElementById("telegram-link");
    const githubLink = document.getElementById("github-link");

    emailLink.addEventListener("click", e => {
      e.preventDefault();
      window.location.href = `mailto:${hidden.email}`;
    });
    telegramLink.addEventListener("click", e => {
      e.preventDefault();
      window.open(hidden.telegram, "_blank");
    });
    githubLink.addEventListener("click", e => {
      e.preventDefault();
      window.open(hidden.github, "_blank");
    });

    function applyPageLang(lang) {
      const t = pageLang[lang];
      document.title = t.title;
      document.getElementById("contact-title").textContent = t.contactTitle;
      document.getElementById("email-label").textContent = t.emailLabel;
      document.getElementById("telegram-label").textContent = t.telegramLabel;
      document.getElementById("github-label").textContent = t.githubLabel;
      emailLink.textContent = t.emailText;
      telegramLink.textContent = t.telegramText;
      githubLink.textContent = t.githubText;
    }

    const initial = localStorage.getItem("lang") || "ru";
    applyPageLang(initial);
    document.addEventListener("langchange", e => applyPageLang(e.detail.lang));
  </script>
</body>
</html>
